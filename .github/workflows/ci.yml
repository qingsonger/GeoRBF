      - name: Smoke-test tangent-observation compilation benchmark
        run: cargo bench -p georbf --bench tangent_observation_compilation -- --smoke
      - name: Smoke-test local-thickness compilation benchmark
        run: cargo bench -p georbf --bench local_thickness_compilation -- --smoke
      - name: Smoke-test sampled-thickness validation benchmark
