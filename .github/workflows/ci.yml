name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  draft:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft }}
    name: draft (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.1 --profile minimal --component clippy --component rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --all-features
      - name: Test documentation
        run: cargo test --doc --workspace
      - name: Validate requirement registry
        run: cargo xtask requirements check

  workspace:
    if: ${{ github.event_name == 'push' || github.event.pull_request.draft == false }}
    name: workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.1 --profile minimal --component clippy --component rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --all-features
      - name: Test documentation
        run: cargo test --doc --workspace
      - name: Smoke-test radial kernel calculus benchmark
        run: cargo bench -p georbf --bench radial_kernel_calculus -- --smoke
      - name: Smoke-test polyharmonic spline benchmark
        run: cargo bench -p georbf --bench polyharmonic_spline -- --smoke
      - name: Smoke-test smooth global kernels benchmark
        run: cargo bench -p georbf --bench smooth_global_kernels -- --smoke
      - name: Smoke-test Wendland kernels benchmark
        run: cargo bench -p georbf --bench wendland_kernels -- --smoke
      - name: Smoke-test global anisotropy benchmark
        run: cargo bench -p georbf --bench global_anisotropy -- --smoke
      - name: Smoke-test polynomial spaces benchmark
        run: cargo bench -p georbf --bench polynomial_spaces -- --smoke
      - name: Smoke-test atomic functionals benchmark
        run: cargo bench -p georbf --bench atomic_functionals -- --smoke
      - name: Validate requirement registry
        run: cargo xtask requirements check
