name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  draft:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft }}
    name: draft (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.1 --profile minimal --component clippy --component rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --all-features
      - name: Test documentation
        run: cargo test --doc --workspace
      - name: Lint rank-backend spike
        run: cargo clippy --manifest-path spikes/rank-backends/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test rank-spike feature configurations
        run: |
          cargo test --manifest-path spikes/rank-backends/Cargo.toml --all-features
          cargo test --manifest-path spikes/rank-backends/Cargo.toml --no-default-features --features faer-backend
          cargo test --manifest-path spikes/rank-backends/Cargo.toml --no-default-features --features nalgebra-backend
      - name: Reject rank-spike without a backend
        shell: bash
        run: |
          if output=$(cargo check --manifest-path spikes/rank-backends/Cargo.toml --no-default-features 2>&1); then
            echo "rank-backend spike unexpectedly accepted an empty backend selection" >&2
            exit 1
          fi
          grep -Fq "enable at least one rank backend feature" <<< "$output"
      - name: Smoke-test rank-backend spike
        run: cargo run --manifest-path spikes/rank-backends/Cargo.toml --release -- --smoke
      - name: Lint dense-factorization spike
        run: cargo clippy --manifest-path spikes/factorization-backends/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test dense-factorization feature configurations
        run: |
          cargo test --manifest-path spikes/factorization-backends/Cargo.toml --all-features
          cargo test --manifest-path spikes/factorization-backends/Cargo.toml --no-default-features --features faer-backend
          cargo test --manifest-path spikes/factorization-backends/Cargo.toml --no-default-features --features nalgebra-backend
      - name: Reject dense-factorization spike without a backend
        shell: bash
        run: |
          if output=$(cargo check --manifest-path spikes/factorization-backends/Cargo.toml --no-default-features 2>&1); then
            echo "dense-factorization spike unexpectedly accepted an empty backend selection" >&2
            exit 1
          fi
          grep -Fq "enable at least one dense factorization backend feature" <<< "$output"
      - name: Smoke-test dense-factorization spike
        run: cargo run --manifest-path spikes/factorization-backends/Cargo.toml --release -- --smoke
      - name: Lint convex-backend spike
        run: |
          cargo fmt --manifest-path spikes/convex-backends/Cargo.toml -- --check
          cargo clippy --manifest-path spikes/convex-backends/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test convex-spike feature configurations
        run: |
          cargo test --manifest-path spikes/convex-backends/Cargo.toml --all-features
          cargo test --manifest-path spikes/convex-backends/Cargo.toml --no-default-features --features clarabel-backend
          cargo test --manifest-path spikes/convex-backends/Cargo.toml --no-default-features --features osqp-backend
      - name: Reject convex spike without a backend
        shell: bash
        run: |
          if output=$(cargo check --manifest-path spikes/convex-backends/Cargo.toml --no-default-features 2>&1); then
            echo "convex-backend spike unexpectedly accepted an empty backend selection" >&2
            exit 1
          fi
          grep -Fq "enable at least one convex backend feature" <<< "$output"
      - name: Smoke-test convex-backend spike
        run: cargo run --manifest-path spikes/convex-backends/Cargo.toml --release -- --smoke
      - name: Lint compact-sparse spike
        run: |
          cargo fmt --manifest-path spikes/sparse-backends/Cargo.toml -- --check
          cargo clippy --manifest-path spikes/sparse-backends/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test compact-sparse feature configurations
        run: |
          cargo test --manifest-path spikes/sparse-backends/Cargo.toml --all-features
          cargo test --manifest-path spikes/sparse-backends/Cargo.toml --no-default-features --features faer-backend,kiddo-index
          cargo test --manifest-path spikes/sparse-backends/Cargo.toml --no-default-features --features faer-backend,rstar-index
          cargo test --manifest-path spikes/sparse-backends/Cargo.toml --no-default-features --features sprs-backend,kiddo-index
          cargo test --manifest-path spikes/sparse-backends/Cargo.toml --no-default-features --features sprs-backend,rstar-index
      - name: Reject compact-sparse spike without a factorization backend
        shell: bash
        run: |
          if output=$(cargo check --manifest-path spikes/sparse-backends/Cargo.toml --no-default-features --features rstar-index 2>&1); then
            echo "compact-sparse spike unexpectedly accepted a missing factorization backend" >&2
            exit 1
          fi
          grep -Fq "enable at least one sparse factorization backend feature" <<< "$output"
      - name: Reject compact-sparse spike without a spatial index
        shell: bash
        run: |
          if output=$(cargo check --manifest-path spikes/sparse-backends/Cargo.toml --no-default-features --features faer-backend 2>&1); then
            echo "compact-sparse spike unexpectedly accepted a missing spatial index" >&2
            exit 1
          fi
          grep -Fq "enable at least one spatial index feature" <<< "$output"
      - name: Smoke-test compact-sparse spike
        run: cargo run --manifest-path spikes/sparse-backends/Cargo.toml --release --all-features -- --smoke
      - name: Validate requirement registry
        run: cargo xtask requirements check

  workspace:
    if: ${{ github.event_name == 'push' || github.event.pull_request.draft == false }}
    name: workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.1 --profile minimal --component clippy --component rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --all-features
      - name: Test documentation
        run: cargo test --doc --workspace
      - name: Lint rank-backend spike
        run: cargo clippy --manifest-path spikes/rank-backends/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test rank-spike feature configurations
        run: |
          cargo test --manifest-path spikes/rank-backends/Cargo.toml --all-features
          cargo test --manifest-path spikes/rank-backends/Cargo.toml --no-default-features --features faer-backend
          cargo test --manifest-path spikes/rank-backends/Cargo.toml --no-default-features --features nalgebra-backend
      - name: Reject rank-spike without a backend
        shell: bash
        run: |
          if output=$(cargo check --manifest-path spikes/rank-backends/Cargo.toml --no-default-features 2>&1); then
            echo "rank-backend spike unexpectedly accepted an empty backend selection" >&2
            exit 1
          fi
          grep -Fq "enable at least one rank backend feature" <<< "$output"
      - name: Smoke-test rank-backend spike
        run: cargo run --manifest-path spikes/rank-backends/Cargo.toml --release -- --smoke
      - name: Lint dense-factorization spike
        run: cargo clippy --manifest-path spikes/factorization-backends/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test dense-factorization feature configurations
        run: |
          cargo test --manifest-path spikes/factorization-backends/Cargo.toml --all-features
          cargo test --manifest-path spikes/factorization-backends/Cargo.toml --no-default-features --features faer-backend
          cargo test --manifest-path spikes/factorization-backends/Cargo.toml --no-default-features --features nalgebra-backend
      - name: Reject dense-factorization spike without a backend
        shell: bash
        run: |
          if output=$(cargo check --manifest-path spikes/factorization-backends/Cargo.toml --no-default-features 2>&1); then
            echo "dense-factorization spike unexpectedly accepted an empty backend selection" >&2
            exit 1
          fi
          grep -Fq "enable at least one dense factorization backend feature" <<< "$output"
      - name: Smoke-test dense-factorization spike
        run: cargo run --manifest-path spikes/factorization-backends/Cargo.toml --release -- --smoke
      - name: Lint convex-backend spike
        run: |
          cargo fmt --manifest-path spikes/convex-backends/Cargo.toml -- --check
          cargo clippy --manifest-path spikes/convex-backends/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test convex-spike feature configurations
        run: |
          cargo test --manifest-path spikes/convex-backends/Cargo.toml --all-features
          cargo test --manifest-path spikes/convex-backends/Cargo.toml --no-default-features --features clarabel-backend
          cargo test --manifest-path spikes/convex-backends/Cargo.toml --no-default-features --features osqp-backend
      - name: Reject convex spike without a backend
        shell: bash
        run: |
          if output=$(cargo check --manifest-path spikes/convex-backends/Cargo.toml --no-default-features 2>&1); then
            echo "convex-backend spike unexpectedly accepted an empty backend selection" >&2
            exit 1
          fi
          grep -Fq "enable at least one convex backend feature" <<< "$output"
      - name: Smoke-test convex-backend spike
        run: cargo run --manifest-path spikes/convex-backends/Cargo.toml --release -- --smoke
      - name: Lint compact-sparse spike
        run: |
          cargo fmt --manifest-path spikes/sparse-backends/Cargo.toml -- --check
          cargo clippy --manifest-path spikes/sparse-backends/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test compact-sparse feature configurations
        run: |
          cargo test --manifest-path spikes/sparse-backends/Cargo.toml --all-features
          cargo test --manifest-path spikes/sparse-backends/Cargo.toml --no-default-features --features faer-backend,kiddo-index
          cargo test --manifest-path spikes/sparse-backends/Cargo.toml --no-default-features --features faer-backend,rstar-index
          cargo test --manifest-path spikes/sparse-backends/Cargo.toml --no-default-features --features sprs-backend,kiddo-index
          cargo test --manifest-path spikes/sparse-backends/Cargo.toml --no-default-features --features sprs-backend,rstar-index
      - name: Reject compact-sparse spike without a factorization backend
        shell: bash
        run: |
          if output=$(cargo check --manifest-path spikes/sparse-backends/Cargo.toml --no-default-features --features rstar-index 2>&1); then
            echo "compact-sparse spike unexpectedly accepted a missing factorization backend" >&2
            exit 1
          fi
          grep -Fq "enable at least one sparse factorization backend feature" <<< "$output"
      - name: Reject compact-sparse spike without a spatial index
        shell: bash
        run: |
          if output=$(cargo check --manifest-path spikes/sparse-backends/Cargo.toml --no-default-features --features faer-backend 2>&1); then
            echo "compact-sparse spike unexpectedly accepted a missing spatial index" >&2
            exit 1
          fi
          grep -Fq "enable at least one spatial index feature" <<< "$output"
      - name: Smoke-test compact-sparse spike
        run: cargo run --manifest-path spikes/sparse-backends/Cargo.toml --release --all-features -- --smoke
      - name: Smoke-test radial kernel calculus benchmark
        run: cargo bench -p georbf --bench radial_kernel_calculus -- --smoke
      - name: Smoke-test polyharmonic spline benchmark
        run: cargo bench -p georbf --bench polyharmonic_spline -- --smoke
      - name: Smoke-test smooth global kernels benchmark
        run: cargo bench -p georbf --bench smooth_global_kernels -- --smoke
      - name: Smoke-test Wendland kernels benchmark
        run: cargo bench -p georbf --bench wendland_kernels -- --smoke
      - name: Smoke-test global anisotropy benchmark
        run: cargo bench -p georbf --bench global_anisotropy -- --smoke
      - name: Smoke-test orientation tensor benchmark
        run: cargo bench -p georbf --bench orientation_tensor -- --smoke
      - name: Smoke-test local trend mixture benchmark
        run: cargo bench -p georbf --bench local_trend_mixture -- --smoke
      - name: Smoke-test regional trend-control compilation benchmark
        run: cargo bench -p georbf --bench trend_control_compilation -- --smoke
      - name: Smoke-test polynomial spaces benchmark
        run: cargo bench -p georbf --bench polynomial_spaces -- --smoke
      - name: Smoke-test atomic functionals benchmark
        run: cargo bench -p georbf --bench atomic_functionals -- --smoke
      - name: Smoke-test CPD rank and null-space benchmark
        run: cargo bench -p georbf --bench cpd_rank_nullspace -- --smoke
      - name: Smoke-test semantic and canonical problem IR benchmark
        run: cargo bench -p georbf --bench problem_ir -- --smoke
      - name: Smoke-test hard-equality field assembly benchmark
        run: cargo bench -p georbf --bench field_assembly -- --smoke
      - name: Smoke-test dense equality solver benchmark
        run: cargo bench -p georbf --bench dense_equality_solver -- --smoke
      - name: Smoke-test immutable fitted-field benchmark
        run: cargo bench -p georbf --bench fitted_field_evaluation -- --smoke
      - name: Smoke-test compact sparse field benchmark
        run: cargo bench -p georbf --bench compact_sparse_field -- --smoke
      - name: Smoke-test rank-safe center-selection benchmark
        run: cargo bench -p georbf --bench center_selection -- --smoke
      - name: Smoke-test deterministic parameter-tuning benchmark
        run: cargo bench -p georbf --bench parameter_tuning -- --smoke
      - name: Smoke-test dense and sparse performance baseline
        run: cargo bench -p georbf --bench performance_baseline -- --smoke
      - name: Smoke-test linear semantic compilation benchmark
        run: cargo bench -p georbf --bench linear_constraint_compilation -- --smoke
      - name: Smoke-test canonical convex solver benchmark
